<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memory Match</title>
  <!-- Link CSS file -->
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <main class="game-shell">
    <header class="game-header">
      <div>
        <p class="eyebrow">Memory Match</p>
        <h1>Find every pair</h1>
      </div>
      <button id="restartButton" type="button">New Game</button>
    </header>

    <section class="status-panel" aria-live="polite">
      <p>Moves: <span id="moves">0</span></p>
      <p>Matches: <span id="matches">0</span> / <span id="totalPairs">0</span></p>
    </section>

    <!-- Space where JavaScript will dynamically insert the cards -->
    <section id="gameBoard" class="game-board" aria-label="Memory card board"></section>
    
    <p id="message" class="message" aria-live="polite"></p>
  </main>

  <!-- Link JavaScript file -->
  <script src="script.js"></script>
</body>
</html>
